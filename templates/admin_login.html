{% extends 'base.html' %}{% block title %}Admin Login{% endblock %}{% block content %}
<div class="py-5" style="background:var(--light-bg);min-height:80vh;display:flex;align-items:center;">
<div class="container"><div class="row justify-content-center"><div class="col-md-4">
<div class="card border-0 shadow rounded-4 p-4">
    <div class="text-center mb-4"><i class="bi bi-shield-lock" style="font-size:2.5rem;color:var(--primary);"></i><h2 class="mt-2 mb-0">Admin Panel</h2><p class="text-muted small">Secure Property Hub</p></div>
    <form method="POST" action="{{ url_for('admin_login') }}">
        <div class="mb-3"><label class="form-label">Admin Email</label><input type="email" name="email" class="form-control" required></div>
        <div class="mb-4"><label class="form-label">Password</label><input type="password" name="password" class="form-control" required></div>
        <button type="submit" class="btn btn-primary w-100 rounded-pill fw-semibold">Login</button>
    </form>
    <div class="text-center mt-3"><a href="{{ url_for('index') }}" class="small text-muted">← Website Par Wapas</a></div>
</div></div></div></div></div>
{% endblock %}
